baseURL: https://www.microworkflows.org/
languageCode: en-us
title: Microworkflows

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Imprint
      pageRef: /imprint
      weight: 1

params:
  description: Break down complex workflows into microworkflows.
  theme:
    default: system
  customCSS:
    - css/custom.css
  search:
    enable: false
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  editURL:
    enable: false
  page:
    width: wide
